name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    environment: cloudflare
    timeout-minutes: 20
    env:
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'cyber-fortune' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Ziwei chart
        run: npm run build:ziwei-chart

      - name: Check Cloudflare credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::error::Cloudflare credentials are missing. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to the cloudflare environment secrets."
            echo "### Cloudflare deployment blocked" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID, then rerun this workflow." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Ensure Cloudflare Pages project exists
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          projects_json="$(npx wrangler pages project list --json)"
          if printf '%s' "$projects_json" | node scripts/cloudflare-pages-project-exists.mjs; then
            echo "Pages project '$CLOUDFLARE_PAGES_PROJECT' already exists."
          else
            project_status=$?
            if [[ "$project_status" -ne 1 ]]; then
              echo "::error::Unable to parse the Cloudflare Pages project list."
              exit "$project_status"
            fi
            echo "Pages project '$CLOUDFLARE_PAGES_PROJECT' does not exist; creating it."
            npx wrangler pages project create "$CLOUDFLARE_PAGES_PROJECT" --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy . --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch=main --commit-dirty=true
